<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AbsherMetrics — Sign in</title>
<link rel="icon" href="favicon.ico" sizes="any"><link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"><link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png"><link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#070d0a;--bg2:#0b1410;--panel:#0e1a14;--line:#1d3327;--line2:#26432f;--ink:#e8f3ec;--dim:#8aa596;--dim2:#5e7568;--accent:#d4ff4f;--accent2:#7fd4ff;--bad:#ff9d9d;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Barlow Condensed',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(900px 500px at 80% -10%,#13261b80,transparent 60%),radial-gradient(700px 600px at -10% 110%,#0e2a3140,transparent 55%);}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:6px;}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);}
.brand b{color:var(--accent);font-weight:400;}
.tagline{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:26px;}
.card{border:1px solid var(--line);border-radius:14px;background:#0b1410cc;padding:26px 24px 28px;}
.tabs{display:flex;gap:6px;margin-bottom:22px;border:1px solid var(--line);border-radius:24px;padding:4px;}
.tabs button{flex:1;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);background:transparent;border:none;border-radius:20px;padding:10px 8px;cursor:pointer;transition:.18s;}
.tabs button.on{color:var(--bg);background:var(--accent);font-weight:500;}
label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim2);margin:0 0 6px 2px;}
.field{margin-bottom:16px;}
input{width:100%;background:#081109;border:1px solid var(--line2);border-radius:9px;color:var(--ink);font-family:'Barlow Condensed',sans-serif;font-size:17px;padding:12px 13px;transition:.18s;}
input:focus{outline:none;border-color:var(--accent);}
input::placeholder{color:var(--dim2);}
.go{width:100%;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--bg);background:var(--accent);border:none;border-radius:10px;padding:13px;cursor:pointer;margin-top:4px;transition:.18s;}
.go:hover{filter:brightness(1.07);}
.go:disabled{opacity:.5;cursor:default;}
.msg{margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.5;text-align:center;min-height:18px;}
.msg.err{color:var(--bad);}
.msg.ok{color:var(--accent);}
.hint{margin-top:18px;text-align:center;font-size:13px;color:var(--dim2);font-family:'IBM Plex Mono',monospace;line-height:1.6;}
.foot{margin-top:22px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--dim2);text-transform:uppercase;}
.foot a{color:var(--dim);}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #0006;border-top-color:var(--bg);border-radius:50%;vertical-align:-2px;margin-right:7px;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.or{display:flex;align-items:center;gap:12px;margin:20px 0 16px;color:var(--dim2);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;}
.or::before,.or::after{content:"";flex:1;height:1px;background:var(--line);}
.oauth{display:flex;flex-direction:column;gap:10px;}
.oauth button{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border:1px solid var(--line2);border-radius:10px;background:#081109;color:var(--ink);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:500;padding:11px 16px;cursor:pointer;transition:.18s;}
.oauth button:hover{border-color:var(--accent);}
.oauth button:disabled{opacity:.5;cursor:default;}
.oauth button svg{width:18px;height:18px;flex-shrink:0;}
</style></head><body>
<div class="wrap">
  <div class="brand"><span class="dot"></span>ABSHER<b>METRICS</b></div>
  <div class="tagline">The physics behind every yard.</div>
  <div class="card">
    <div class="tabs">
      <button id="tabIn" class="on" type="button">Sign in</button>
      <button id="tabUp" type="button">Create account</button>
    </div>
    <form id="form" autocomplete="on">
      <div class="field" id="nameField" style="display:none">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name" placeholder="Your name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" inputmode="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" minlength="6" required>
      </div>
      <button class="go" id="submit" type="submit">Sign in</button>
      <div class="msg" id="msg"></div>
    </form>
    <div class="or">or</div>
    <div class="oauth">
      <button type="button" id="googleBtn" aria-label="Continue with Google">
        <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        <span>Continue with Google</span>
      </button>
      <button type="button" id="appleBtn" aria-label="Continue with Apple">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08c-.744.9-1.99 1.57-2.987 1.57c-.12 0-.23-.02-.3-.03c-.01-.06-.04-.22-.04-.39c0-1.15.572-2.27 1.206-2.98c.804-.94 2.142-1.64 3.248-1.68c.03.13.05.28.05.43zm4.565 15.71c-.03.07-.463 1.58-1.518 3.12c-.945 1.34-1.94 2.71-3.43 2.71c-1.517 0-1.9-.88-3.63-.88c-1.698 0-2.302.91-3.67.91c-1.377 0-2.332-1.26-3.428-2.8c-1.287-1.82-2.323-4.63-2.323-7.28c0-4.28 2.797-6.55 5.552-6.55c1.448 0 2.675.95 3.6.95c.865 0 2.222-1.01 3.902-1.01c.643 0 2.928.06 4.428 2.16c-.12.07-2.61 1.53-2.61 4.5c0 3.46 3.02 4.68 3.06 4.7z"/></svg>
        <span>Continue with Apple</span>
      </button>
    </div>
    <div class="hint" id="hint">Your data syncs across web, iOS, and Android.</div>
  </div>
  <div class="foot"><a href="privacy.html">Privacy</a> &middot; AbsherMetrics</div>
</div>

<script type="module">
import { supabase, signIn, signUp, signInWithOAuth } from './auth.js';

const params = new URLSearchParams(location.search);
const next = sanitizeNext(params.get('next'));

// Already signed in? Skip the form. (Also catches the OAuth round-trip: the provider
// redirects back here with the session in the URL hash; detectSessionInUrl parses it,
// getSession() returns it, and we forward to `next`.)
const { data: { session } } = await supabase.auth.getSession();
if (session) location.replace(next);
// Belt-and-suspenders: if the OAuth session lands a beat after getSession() above,
// forward as soon as supabase emits it.
supabase.auth.onAuthStateChange((_e, s) => { if (s) location.replace(next); });

const tabIn = document.getElementById('tabIn');
const tabUp = document.getElementById('tabUp');
const nameField = document.getElementById('nameField');
const form = document.getElementById('form');
const submit = document.getElementById('submit');
const pwd = document.getElementById('password');
const msg = document.getElementById('msg');
const hint = document.getElementById('hint');
let mode = 'in'; // 'in' | 'up'

function setMode(m){
  mode = m;
  const up = m === 'up';
  tabUp.classList.toggle('on', up);
  tabIn.classList.toggle('on', !up);
  nameField.style.display = up ? '' : 'none';
  submit.textContent = up ? 'Create account' : 'Sign in';
  pwd.setAttribute('autocomplete', up ? 'new-password' : 'current-password');
  hint.textContent = up
    ? 'One account works on web, iOS, and Android.'
    : 'Your data syncs across web, iOS, and Android.';
  setMsg('');
}
tabIn.addEventListener('click', () => setMode('in'));
tabUp.addEventListener('click', () => setMode('up'));

// Arriving from the marketing page's "Create account" CTA opens the sign-up tab.
if (params.get('signup')) setMode('up');

function setMsg(text, kind){ msg.textContent = text; msg.className = 'msg' + (kind ? ' ' + kind : ''); }
function busy(on){
  submit.disabled = on;
  submit.innerHTML = on
    ? '<span class="spin"></span>' + (mode === 'up' ? 'Creating…' : 'Signing in…')
    : (mode === 'up' ? 'Create account' : 'Sign in');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = pwd.value;
  const name = document.getElementById('name').value;
  if (!email || !password) return;
  busy(true); setMsg('');
  try {
    if (mode === 'up') {
      const { error, needsConfirm } = await signUp(email, password, name);
      if (error) { setMsg(error, 'err'); return; }
      if (needsConfirm) { setMsg('Check your email to confirm your account, then sign in.', 'ok'); setMode('in'); return; }
    } else {
      const { error } = await signIn(email, password);
      if (error) { setMsg(error, 'err'); return; }
    }
    location.replace(next);
  } finally {
    busy(false);
  }
});

// ---- OAuth (Google / Apple) ----
const googleBtn = document.getElementById('googleBtn');
const appleBtn = document.getElementById('appleBtn');
// Apple web sign-in turns on once the Apple provider is configured in Supabase.
// Both Google + Apple providers are now live (2026-06-11).
const SHOW_APPLE = true;
if (!SHOW_APPLE) appleBtn.style.display = 'none';
async function oauth(provider, btn) {
  setMsg('');
  googleBtn.disabled = appleBtn.disabled = submit.disabled = true;
  btn.querySelector('span').textContent = 'Redirecting…';
  const { error } = await signInWithOAuth(provider, next);
  if (error) {
    setMsg(error, 'err');
    googleBtn.disabled = appleBtn.disabled = submit.disabled = false;
    googleBtn.querySelector('span').textContent = 'Continue with Google';
    appleBtn.querySelector('span').textContent = 'Continue with Apple';
  }
  // On success the browser navigates to the provider; nothing more runs here.
}
googleBtn.addEventListener('click', () => oauth('google', googleBtn));
if (SHOW_APPLE) appleBtn.addEventListener('click', () => oauth('apple', appleBtn));

// Only allow redirecting to a SAME-ORIGIN page (no open redirect). Resolve the
// candidate against our origin and reject anything that lands off-site — this
// also defeats whitespace/control-char and protocol-relative tricks the browser
// would otherwise normalize (e.g. " //evil.com", "\\t//evil.com", "javascript:").
function sanitizeNext(v){
  if (!v) return 'index.html';
  try { v = decodeURIComponent(v); } catch (_) {}
  try {
    const u = new URL(v, location.href);
    if (u.origin !== location.origin) return 'index.html';
    const rel = u.pathname.replace(/^\//, '') + u.search + u.hash;
    return rel || 'index.html';
  } catch (_) { return 'index.html'; }
}
</script>
</body></html>
